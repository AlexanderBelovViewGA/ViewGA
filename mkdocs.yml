site_name: ViewGA Documentation
language: ru

theme:
  name: material
  palette:
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Темная тема
    - scheme: default
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Светлая тема
  
  features:
    - navigation.tabs              # Главные разделы выносятся в верхнюю панель
    - navigation.sections          # Группировка подразделов слева
    - navigation.sticky            # Шапка прилипает к верху
    - navigation.tracking          # Подсвечивает, где ты сейчас находишься, при скролле
    - navigation.top               # Кнопка быстрой прокрутки вверх
    - search.suggest               # Умные подсказки в поиске
    - search.highlight             # Подсветка найденного текста

nav:
  - Главная: index.md
  - Создание карты:
      - Что такое карта?: map/index.md
      - Инициализация: map/initialization.md
      - Запись данных: map/recording.md
      - Реконструкция в Metashape: map/reconstruction.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
